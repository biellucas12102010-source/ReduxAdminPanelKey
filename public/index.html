<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Redux Key System</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#04050F;color:white;font-family:'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{text-align:center;padding:48px 40px;border:1px solid #2A3585;border-radius:14px;background:linear-gradient(160deg,#0D1040,#070B2A);max-width:420px;width:90%}
  h1{font-size:36px;font-weight:900;letter-spacing:5px;margin-bottom:8px;color:#4455FF}
  p{color:#7788BB;font-size:13px;margin-bottom:32px;letter-spacing:1px}
  a{display:inline-block;padding:13px 40px;background:linear-gradient(135deg,#2233CC,#4455FF);color:white;text-decoration:none;border-radius:8px;font-weight:700;letter-spacing:2px;font-size:13px;transition:opacity .2s}
  a:hover{opacity:.85}
</style>
</head>
<body>
  <div class="card">
    <h1>REDUX</h1>
    <p>Key Management System</p>
    <a href="/admin.html">Acessar Painel Admin</a>
  </div>
</body>
</html>
